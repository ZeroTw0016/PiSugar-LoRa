<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiSugar 3 WebUI</title>
    <link rel="stylesheet" href="static/darkmode.css">
</head>
<body>
    <div class="main-layout" style="display: flex; height: 95vh;">
        <!-- Seitenpanel: Batterie-Infos -->
        <div class="side-panel" style="width: 320px; background: #222; color: #fff; padding: 1em; overflow-y: auto;">
            <h2>Batterie & System</h2>
            <div id="status"></div>
            <div class="controls">
                <button onclick="toggleWriteProtection()" id="wpBtn">Toggle Write Protection</button>
                <button onclick="refreshStatus()">Refresh Status</button>
            </div>
        </div>
        <!-- Hauptpanel: LoRa -->
        <div class="main-panel" style="flex: 1; background: #181818; color: #fff; padding: 1em; overflow-y: auto;">
            <h2>LoRa Nachrichten</h2>
            <div id="lora-messages" style="height: 60vh; overflow-y: auto; background: #222; margin-bottom: 1em; padding: 1em; border-radius: 8px;"></div>
            <form id="lora-send-form" onsubmit="sendLoraMsg(event)" style="display: flex; gap: 0.5em;">
                <input type="text" id="lora-msg" placeholder="Nachricht senden..." style="flex: 1; padding: 0.5em; border-radius: 4px; border: none;">
                <button type="submit">Senden</button>
            </form>
        </div>
    </div>
    <script>
        async function refreshStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            let html = '<table>';
            for (const [k, v] of Object.entries(data)) {
                if (["battery_percent","battery_voltage_mv","chip_temp_c","external_power","charging_switch","charging_protection"].includes(k)) {
                    html += `<tr><td>${k}</td><td>${v}</td></tr>`;
                }
            }
            html += '</table>';
            document.getElementById('status').innerHTML = html;
            document.getElementById('wpBtn').innerText = data.write_protection ? 'Disable Write Protection' : 'Enable Write Protection';
        }
        async function toggleWriteProtection() {
            const res = await fetch('/api/write_protection', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: !(await (await fetch('/api/write_protection')).json()).write_protection })
            });
            refreshStatus();
        }
        async function loadLoraMessages() {
            const res = await fetch('/api/lora/messages');
            const msgs = await res.json();
            let html = '';
            for (const m of msgs) {
                html += `<div style="margin-bottom:0.5em;"><b>${m.type === 'sent' ? 'Gesendet' : 'Empfangen'}:</b> <span>${m.msg}</span></div>`;
            }
            document.getElementById('lora-messages').innerHTML = html;
        }
        async function sendLoraMsg(e) {
            e.preventDefault();
            const msg = document.getElementById('lora-msg').value;
            if (!msg) return;
            await fetch('/api/lora/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg })
            });
            document.getElementById('lora-msg').value = '';
            await loadLoraMessages();
        }
        async function pollLora() {
            await loadLoraMessages();
            setTimeout(pollLora, 2000);
        }
        window.onload = function() {
            refreshStatus();
            pollLora();
        }
    </script>
</body>
</html>
